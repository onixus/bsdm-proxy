[package]
name = "proxy"
version = "0.2.0"
edition = "2021"

[dependencies]
pingora = { workspace = true }
pingora-core = { workspace = true }
pingora-proxy = { workspace = true }
pingora-cache = { workspace = true }
tokio = { workspace = true }
rdkafka = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
rcgen = { workspace = true }
pem = { workspace = true }
time = { workspace = true }
base64 = { workspace = true }
url = { workspace = true }

# Phase 1 optimizations
dashmap = "6.0"              # Lock-free concurrent HashMap
xxhash-rust = { version = "0.8", features = ["xxh3"] }  # Fast hashing
tikv-jemallocator = "0.5"   # Better allocator

[profile.release]
lto = "fat"                  # Link-time optimization
codegen-units = 1            # Better optimization
opt-level = 3                # Maximum optimization
strip = true                 # Strip symbols
panic = "abort"              # Faster panics

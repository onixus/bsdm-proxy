# Grafana Unified Alerting rules for M4 threat analytics (Prometheus datasource).
# Mirror of prometheus/alerts/m4_threat.yml — visible in Grafana Alerting UI.
apiVersion: 1

groups:
  - orgId: 1
    name: bsdm_m4_threat
    folder: BSDM M4
    interval: 1m
    rules:
      - uid: bsdm_m4_beacon
        title: Alert-worker beacon findings
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: increase(alert_worker_findings_total{rule="beacon_periodic"}[10m])
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $B > 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: math
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: C&C beacon findings from alert-worker
          description: increase(alert_worker_findings_total{rule="beacon_periodic"}[10m]) > 0
          dashboardUid: bsdm-http-traffic-ch
        labels:
          severity: warning
          team: bsdm-m4
          rule: beacon_periodic


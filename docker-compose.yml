# Use legacy builder instead of Bake
x-bake:
  no-cache: false

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.8
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bsdm-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.9.8
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: bsdm
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/clickhouse/http_cache.sql:/docker-entrypoint-initdb.d/01-http_cache.sql:ro
      - ./scripts/clickhouse/ml_features.sql:/docker-entrypoint-initdb.d/02-ml_features.sql:ro
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
    ports:
      - "1488:1488"
      - "9090:9090"  # Metrics endpoint
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=cache-events
      - CACHE_CAPACITY=10000
      - CACHE_TTL_SECONDS=3600
      - MAX_CACHE_BODY_SIZE=10485760
      - HTTP_PORT=1488
      - METRICS_PORT=9090
      - MITM_ENABLED=true
      - AUTH_ENABLED=false
      - SHUTDOWN_TIMEOUT_SECONDS=30
      - ACL_ENABLED=false
      - ACL_DEFAULT_ACTION=allow
      - ACL_RULES_PATH=/etc/bsdm-proxy/acl-rules.json
      - ACL_AUTO_RELOAD=false
      - CATEGORIZATION_ENABLED=false
      - UT1_ENABLED=false
      - THREAT_SCORE_ENABLED=${THREAT_SCORE_ENABLED:-false}
      - THREAT_SCORE_POLL_URL=${THREAT_SCORE_POLL_URL:-http://ml-worker:8091/api/threat-scores}
      - THREAT_SCORE_POLL_INTERVAL_SECS=${THREAT_SCORE_POLL_INTERVAL_SECS:-60}
      - UT1_PATH=/var/lib/ut1-blacklists
      - RUST_LOG=info,bsdm_proxy=debug
      - RUST_BACKTRACE=1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bsdm-net
    volumes:
      - ./certs:/certs:ro
      - ./config/acl-rules.example.json:/etc/bsdm-proxy/acl-rules.json:ro
    tty: true
    stdin_open: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache-indexer:
    build:
      context: .
      dockerfile: Dockerfile
      target: cache-indexer
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=cache-events
      - KAFKA_GROUP_ID=cache-indexer-group
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=bsdm
      - CLICKHOUSE_TABLE=http_cache
      - METRICS_PORT=8080
      - SEARCH_API_ENABLED=true
      - RUST_LOG=info,cache_indexer=debug
      - RUST_BACKTRACE=1
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - bsdm-net
    restart: unless-stopped

  # Optional SIEM/webhook alerts (B19 / #50). Requires ALERT_WEBHOOK_URL.
  #   ALERT_WEBHOOK_URL=https://hooks.example/siem docker compose --profile alerts up -d alert-worker
  alert-worker:
    profiles: ["alerts"]
    build:
      context: .
      dockerfile: Dockerfile
      target: alert-worker
    ports:
      - "8090:8090"
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_WEBHOOK_HEADERS=${ALERT_WEBHOOK_HEADERS:-{}}
      - ALERT_POLL_INTERVAL_SECS=${ALERT_POLL_INTERVAL_SECS:-60}
      - ALERT_LOOKBACK_SECS=${ALERT_LOOKBACK_SECS:-300}
      - ALERT_DEDUPE_TTL_SECS=${ALERT_DEDUPE_TTL_SECS:-3600}
      - ALERT_RULES=${ALERT_RULES:-blocked_burst,domain_burst,off_hours_threat,high_entropy_domain,beacon_periodic}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=bsdm
      - CLICKHOUSE_TABLE=http_cache
      - METRICS_PORT=8090
      - RUST_LOG=info,alert_worker=info
    depends_on:
      clickhouse:
        condition: service_healthy
      cache-indexer:
        condition: service_started
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Optional M5 feature store / scoring (ADR 0003).
  #   docker compose --profile ml up -d --build ml-worker
  # Optional SIEM: ML_WEBHOOK_URL=https://hooks.example/siem
  ml-worker:
    profiles: ["ml"]
    build:
      context: .
      dockerfile: Dockerfile
      target: ml-worker
    ports:
      - "8091:8091"
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=bsdm
      - CLICKHOUSE_TABLE=http_cache
      - ML_FEATURES_TABLE=entity_features
      - ML_SCORES_TABLE=ml_scores
      - ML_PHISHING_FEATURES_TABLE=domain_phishing_features
      - ML_BEACON_FEATURES_TABLE=beacon_pair_features
      - ML_SCORE_CACHE_TABLE=threat_score_cache
      - ML_WRITEBACK_ENABLED=${ML_WRITEBACK_ENABLED:-true}
      - ML_WRITEBACK_MIN_SCORE=${ML_WRITEBACK_MIN_SCORE:-0.5}
      - ML_WRITEBACK_TTL_SECS=${ML_WRITEBACK_TTL_SECS:-3600}
      - ML_POLL_INTERVAL_SECS=${ML_POLL_INTERVAL_SECS:-120}
      - ML_LOOKBACK_SECS=${ML_LOOKBACK_SECS:-300}
      - ML_ENTITY_TYPES=${ML_ENTITY_TYPES:-client_ip}
      - ML_MIN_REQUESTS=${ML_MIN_REQUESTS:-10}
      - ML_MODEL=${ML_MODEL:-ueba_zscore_v0}
      - ML_SCORE_THRESHOLD=${ML_SCORE_THRESHOLD:-0.8}
      - ML_BASELINE_LOOKBACK_SECS=${ML_BASELINE_LOOKBACK_SECS:-86400}
      - ML_BASELINE_MIN_SAMPLES=${ML_BASELINE_MIN_SAMPLES:-30}
      - ML_ZSCORE_CLIP=${ML_ZSCORE_CLIP:-4.0}
      - ML_BASELINE_PATH=${ML_BASELINE_PATH:-}
      - ML_WEBHOOK_URL=${ML_WEBHOOK_URL:-}
      - METRICS_PORT=8091
      - RUST_LOG=info,ml_worker=info
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8091/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.28.1
    ports:
      - "9093:9093"
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.12.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - bsdm-net
    restart: unless-stopped
    depends_on:
      - proxy
      - alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.3.8
    ports:
      - "3000:3000"
    environment:
      # Change in production: export GRAFANA_ADMIN_PASSWORD before `docker compose up`.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clickhouse-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/alerting:/etc/grafana/provisioning/alerting:ro
    networks:
      - bsdm-net
    restart: unless-stopped
    depends_on:
      - prometheus
      - clickhouse
      - alertmanager
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional ICAP AV sidecar (P3 / #99). Open-source c-icap + ClamAV.
  #   docker compose --profile icap up -d icap
  # Proxy: ICAP_ENABLED=true ICAP_URL=icap://icap:1344/srv_clamav
  # Docs: docs/icap.md
  icap:
    profiles: ["icap"]
    image: toolarium/toolarium-icap-clamav-docker:latest
    ports:
      - "1344:1344"
    networks:
      - bsdm-net
    restart: unless-stopped

  # Optional DNS sinkhole sidecar (P3 / #108). RPZ-lite UDP proxy — not in proxy core.
  #   docker compose --profile dns-sinkhole up -d --build dns-sinkhole
  # Docs: docs/dns-sinkhole.md · ADR 0004
  dns-sinkhole:
    profiles: ["dns-sinkhole"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dns-sinkhole
    ports:
      - "5353:53/udp"
      - "8092:8092"
    environment:
      - DNS_SINKHOLE_BIND=0.0.0.0:53
      - DNS_SINKHOLE_UPSTREAM=${DNS_SINKHOLE_UPSTREAM:-1.1.1.1:53}
      - DNS_SINKHOLE_ZONE_PATH=/etc/bsdm-proxy/blocklist.rpz
      - DNS_SINKHOLE_ACTION=${DNS_SINKHOLE_ACTION:-sinkhole}
      - DNS_SINKHOLE_A=${DNS_SINKHOLE_A:-127.0.0.1}
      - METRICS_PORT=8092
      - RUST_LOG=info,dns_sinkhole=info
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8092/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  bsdm-net:
    driver: bridge

volumes:
  clickhouse-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

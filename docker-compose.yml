# Use legacy builder instead of Bake
x-bake:
  no-cache: false

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.8
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bsdm-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.9.8
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: bsdm
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/clickhouse/http_cache.sql:/docker-entrypoint-initdb.d/01-http_cache.sql:ro
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
    ports:
      - "1488:1488"
      - "9090:9090"  # Metrics endpoint
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=cache-events
      - CACHE_CAPACITY=10000
      - CACHE_TTL_SECONDS=3600
      - MAX_CACHE_BODY_SIZE=10485760
      - HTTP_PORT=1488
      - METRICS_PORT=9090
      - MITM_ENABLED=true
      - AUTH_ENABLED=false
      - SHUTDOWN_TIMEOUT_SECONDS=30
      - ACL_ENABLED=false
      - ACL_DEFAULT_ACTION=allow
      - ACL_RULES_PATH=/etc/bsdm-proxy/acl-rules.json
      - ACL_AUTO_RELOAD=false
      - CATEGORIZATION_ENABLED=false
      - UT1_ENABLED=false
      - UT1_PATH=/var/lib/ut1-blacklists
      - RUST_LOG=info,bsdm_proxy=debug
      - RUST_BACKTRACE=1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bsdm-net
    volumes:
      - ./certs:/certs:ro
      - ./config/acl-rules.example.json:/etc/bsdm-proxy/acl-rules.json:ro
    tty: true
    stdin_open: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache-indexer:
    build:
      context: .
      dockerfile: Dockerfile
      target: cache-indexer
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=cache-events
      - KAFKA_GROUP_ID=cache-indexer-group
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=bsdm
      - CLICKHOUSE_TABLE=http_cache
      - METRICS_PORT=8080
      - SEARCH_API_ENABLED=true
      - RUST_LOG=info,cache_indexer=debug
      - RUST_BACKTRACE=1
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - bsdm-net
    restart: unless-stopped

  # Optional SIEM/webhook alerts (B19 / #50). Requires ALERT_WEBHOOK_URL.
  #   ALERT_WEBHOOK_URL=https://hooks.example/siem docker compose --profile alerts up -d alert-worker
  alert-worker:
    profiles: ["alerts"]
    build:
      context: .
      dockerfile: Dockerfile
      target: alert-worker
    ports:
      - "8090:8090"
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_WEBHOOK_HEADERS=${ALERT_WEBHOOK_HEADERS:-{}}
      - ALERT_POLL_INTERVAL_SECS=${ALERT_POLL_INTERVAL_SECS:-60}
      - ALERT_LOOKBACK_SECS=${ALERT_LOOKBACK_SECS:-300}
      - ALERT_DEDUPE_TTL_SECS=${ALERT_DEDUPE_TTL_SECS:-3600}
      - ALERT_RULES=${ALERT_RULES:-blocked_burst,domain_burst,off_hours_threat,high_entropy_domain,beacon_periodic}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=bsdm
      - CLICKHOUSE_TABLE=http_cache
      - METRICS_PORT=8090
      - RUST_LOG=info,alert_worker=info
    depends_on:
      clickhouse:
        condition: service_healthy
      cache-indexer:
        condition: service_started
    networks:
      - bsdm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.12.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - bsdm-net
    restart: unless-stopped
    depends_on:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.3.8
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clickhouse-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - bsdm-net
    restart: unless-stopped
    depends_on:
      - prometheus
      - clickhouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  bsdm-net:
    driver: bridge

volumes:
  clickhouse-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

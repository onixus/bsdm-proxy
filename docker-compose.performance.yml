version: '3.8'

services:
  # Phase 2: Redis for shared certificate cache
  redis:
    image: redis:7-alpine
    command: |
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          memory: 2500M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - bsdm-net

  # Phase 2: Kafka performance tuning
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Phase 2: Performance tuning
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          memory: 2G

  # Phase 2: OpenSearch with sharding
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "DISABLE_SECURITY_PLUGIN=true"
      # Phase 2: Performance settings
      - "indices.memory.index_buffer_size=20%"
      - "indices.queries.cache.size=10%"
      - "thread_pool.write.queue_size=1000"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          memory: 2G

  # Phase 2: Horizontal scaling - 4 proxy replicas
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "1488-1491:1488"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      # Phase 2: HTTP/2 settings
      - PINGORA_THREADS=4
      - PINGORA_WORK_STEALING=true
      - PINGORA_HTTP2_MAX_STREAMS=128
    depends_on:
      - kafka
      - redis
    networks:
      - bsdm-net
    volumes:
      - ./certs:/certs:ro
    deploy:
      replicas: 4  # Phase 2: Horizontal scaling
      resources:
        limits:
          cpus: '2'
          memory: 512M

  cache-indexer:
    build:
      context: .
      dockerfile: cache-indexer/Dockerfile
    environment:
      - KAFKA_BROKERS=kafka:9092
      - OPENSEARCH_URL=http://opensearch:9200
      - RUST_LOG=info
      # Phase 2: Batch settings
      - BATCH_SIZE=100
      - BATCH_TIMEOUT_MS=5000
    depends_on:
      - kafka
      - opensearch
    networks:
      - bsdm-net
    deploy:
      replicas: 2  # Phase 2: Scale indexer

  # Phase 2: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - bsdm-net

  # Phase 2: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - bsdm-net

volumes:
  redis-data:
  kafka-data:
  opensearch-data:
  prometheus-data:
  grafana-data:

networks:
  bsdm-net:
    driver: bridge

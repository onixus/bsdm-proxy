# Zero-config Lite profile: caching HTTPS proxy + optional SQLite search.
# No Kafka / ClickHouse / Prometheus / Grafana.
#
# Usage:
#   ./scripts/gen-ca.sh
#   docker compose -f docker-compose.lite.yml up -d --build
#   curl --cacert certs/ca.crt -x http://127.0.0.1:1488 https://httpbin.org/get
#   curl 'http://127.0.0.1:8080/api/search?limit=5'
#
# Docs: docs/lite.md · docs/strategic-roadmap.md (Phase 1)

services:
  cache-indexer:
    build:
      context: .
      dockerfile: Dockerfile
      target: cache-indexer
      args:
        LITE_BUILD: "1"
    ports:
      - "8080:8080"
    environment:
      - INDEX_STORE=sqlite
      - SQLITE_PATH=/var/lib/cache-indexer/events.db
      - SQLITE_MAX_ROWS=1000000
      - METRICS_PORT=8080
      - SEARCH_API_ENABLED=true
      # KAFKA_BROKERS / CLICKHOUSE_* intentionally unset
      - RUST_LOG=info,cache_indexer=info
    volumes:
      - lite-indexer:/var/lib/cache-indexer
    networks:
      - bsdm-lite
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  proxy:
    image: ghcr.io/onixus/bsdm-proxy:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
      args:
        LITE_BUILD: "1"
    ports:
      - "1488:1488"
      - "9090:9090"
      - "18080:18080"
    environment:
      - HTTP_PORT=1488
      - METRICS_PORT=9090
      - MITM_ENABLED=true
      - AUTH_ENABLED=false
      - ACL_ENABLED=false
      - ACL_DEFAULT_ACTION=allow
      - CATEGORIZATION_ENABLED=false
      - CACHE_CAPACITY=5000
      - CACHE_TTL_SECONDS=3600
      - MAX_CACHE_BODY_SIZE=10485760
      - CACHE_SPILL_DIR=/var/cache/bsdm-spill
      - CACHE_SPILL_THRESHOLD_BYTES=65536
      - SHUTDOWN_TIMEOUT_SECONDS=30
      - EVENT_SINK_URL=http://cache-indexer:8080/api/events
      # Kafka intentionally unset — HTTP sink to SQLite indexer
      - RUST_LOG=info,bsdm_proxy=info
      - RUST_BACKTRACE=0
    volumes:
      - ./certs:/certs:ro
      - lite-spill:/var/cache/bsdm-spill
    depends_on:
      cache-indexer:
        condition: service_healthy
    networks:
      - bsdm-lite
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Mock upstream for scripts/run-load-test.sh (load-test.yml CI workflow).
  # Shares the proxy container's network namespace so a single loopback
  # address (127.0.0.1:18080) is reachable both from the CI runner host
  # (via the proxy service's published port) and from inside the proxy
  # process itself when it forwards requests to the upstream.
  mock-upstream:
    image: python:3.12-slim
    network_mode: "service:proxy"
    depends_on:
      proxy:
        condition: service_started
    volumes:
      - ./scripts/mock-upstream-threaded.py:/mock-upstream.py:ro
    environment:
      - MOCK_HOST=0.0.0.0
      - MOCK_PORT=18080
    command: ["python3", "/mock-upstream.py"]
    restart: unless-stopped

networks:
  bsdm-lite:
    driver: bridge

volumes:
  lite-spill:
    driver: local
  lite-indexer:
    driver: local

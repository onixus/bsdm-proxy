# Phase 3: Ultimate performance configuration
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: |
      redis-server
      --appendonly yes
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 2048
      --timeout 0
      --tcp-keepalive 60
      --io-threads 4
      --io-threads-do-reads yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4500M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - bsdm-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_NETWORK_THREADS: 16
      KAFKA_NUM_IO_THREADS: 32
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 204800
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 204800
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 209715200
      KAFKA_LOG_SEGMENT_BYTES: 2147483648
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_LOG_RETENTION_HOURS: 12
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g -XX:+UseG1GC"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "indices.memory.index_buffer_size=30%"
      - "indices.queries.cache.size=15%"
      - "thread_pool.write.queue_size=2000"
      - "thread_pool.search.queue_size=2000"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - bsdm-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  # Phase 3: 8 proxy replicas for maximum throughput
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile.ultimate
    ports:
      - "1488-1495:1488"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - PINGORA_THREADS=8
      - PINGORA_WORK_STEALING=true
      - PINGORA_HTTP2_MAX_STREAMS=256
      # Phase 3: Advanced settings
      - IO_URING_ENABLED=true
      - SIMD_JSON_ENABLED=true
      - EBPF_FILTER_ENABLED=true
      - MALLOC_CONF=background_thread:true,metadata_thp:auto,dirty_decay_ms:5000
    depends_on:
      - kafka
      - redis
    networks:
      - bsdm-net
    volumes:
      - ./certs:/certs:ro
    cap_add:
      - SYS_ADMIN  # For eBPF
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'
          memory: 512M

  cache-indexer:
    build:
      context: .
      dockerfile: cache-indexer/Dockerfile
    environment:
      - KAFKA_BROKERS=kafka:9092
      - OPENSEARCH_URL=http://opensearch:9200
      - RUST_LOG=info
      - BATCH_SIZE=200
      - BATCH_TIMEOUT_MS=3000
    depends_on:
      - kafka
      - opensearch
    networks:
      - bsdm-net
    deploy:
      replicas: 4

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--query.max-samples=50000000'
    networks:
      - bsdm-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - bsdm-net

  # Phase 3: HAProxy load balancer
  haproxy:
    image: haproxy:2.8-alpine
    ports:
      - "443:443"
      - "8404:8404"  # Stats
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/certs:ro
    networks:
      - bsdm-net
    depends_on:
      - proxy

volumes:
  redis-data:
  kafka-data:
  opensearch-data:
  prometheus-data:
  grafana-data:

networks:
  bsdm-net:
    driver: bridge

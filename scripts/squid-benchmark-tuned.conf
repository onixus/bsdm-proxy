# Squid 6.14 — tuned for local forward-proxy benchmark (4 workers, in-memory rock).
#
# Compare with BSDM-Proxy using scripts/run-proxy-benchmark.sh

workers 4
cpu_affinity_map process_numbers=1,2,3,4 cores=1,2,3,4

http_port 13128

# In-memory store (~1 GB rock + 256 MB hot mem)
cache_dir rock /var/spool/squid-rock 1024
cache_mem 256 MB
memory_cache_shared on
maximum_object_size 10 MB
maximum_object_size_in_memory 10 MB

acl localnet src 127.0.0.0/8
http_access allow localnet
http_access deny all

# Keep benchmark objects fresh in cache.
refresh_pattern . 0 100% 43200 override-expire override-lastmod reload-into-ims ignore-private

# Reduce overhead
access_log none
cache_log /dev/null
cache_store_log none
client_db off
via off
forwarded_for delete

connect_timeout 3 seconds
read_timeout 3 minutes
request_timeout 3 minutes
pconn_timeout 2 minutes
half_closed_clients off

coredump_dir /var/spool/squid

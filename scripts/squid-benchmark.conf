# Minimal forward proxy for load test comparison with BSDM-Proxy.
http_port 13128
cache_dir ufs /var/spool/squid 256 16 256
maximum_object_size 10 MB
cache_mem 128 MB

# Allow local benchmark only.
acl localnet src 127.0.0.0/8
http_access allow localnet
http_access deny all

# Freshness — keep objects hot for benchmark.
refresh_pattern . 0 100% 43200

access_log none
cache_log /dev/null
coredump_dir /var/spool/squid

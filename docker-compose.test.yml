# Minimal stack for manual / Docker-based smoke and E2E runs.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   ./scripts/run-smoke-tests.sh --external
#   docker compose -f docker-compose.test.yml down

services:
  upstream:
    image: kennethreitz/httpbin:latest
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
    ports:
      - "1488:1488"
      - "9090:9090"
    environment:
      - HTTP_PORT=1488
      - METRICS_PORT=9090
      - MITM_ENABLED=false
      - AUTH_ENABLED=false
      - ACL_ENABLED=false
      - CATEGORIZATION_ENABLED=false
      - RUST_LOG=warn
    volumes:
      - ./certs:/certs:ro
      - ./config/acl-rules.test.json:/etc/bsdm-proxy/acl-rules.json:ro
    depends_on:
      - upstream
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/health | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10

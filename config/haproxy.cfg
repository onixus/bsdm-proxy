# HAProxy configuration for load balancing
global
    maxconn 100000
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    option dontlognull

frontend https_front
    bind *:443 ssl crt /certs/server.crt
    mode http
    option forwardfor
    http-request add-header X-Forwarded-Proto https
    default_backend proxy_backend

backend proxy_backend
    mode http
    balance leastconn
    option httpchk GET /health
    http-check expect status 200
    
    # 8 proxy instances
    server proxy1 proxy:1488 check
    server proxy2 proxy:1488 check
    server proxy3 proxy:1488 check
    server proxy4 proxy:1488 check
    server proxy5 proxy:1488 check
    server proxy6 proxy:1488 check
    server proxy7 proxy:1488 check
    server proxy8 proxy:1488 check

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

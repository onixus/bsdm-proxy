global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'proxy'
    static_configs:
      - targets:
        - 'proxy:9091'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'pingora_.*'
        action: keep

  - job_name: 'kafka'
    static_configs:
      - targets:
        - 'kafka:9092'

  - job_name: 'opensearch'
    static_configs:
      - targets:
        - 'opensearch:9200'

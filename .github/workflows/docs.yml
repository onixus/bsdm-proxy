name: Documentation

on:
  pull_request:
    paths:
      - "*.md"
      - "**/*.md"
      - "docker-compose.pilot.yml"
      - "docs/**"
      - "scripts/check-doc-links.py"
      - "scripts/sync-wiki.py"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "**/*.md"
      - "docker-compose.pilot.yml"
      - "docs/**"
      - "scripts/check-doc-links.py"
      - "scripts/sync-wiki.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check local Markdown links
        run: python3 scripts/check-doc-links.py

  wiki:
    if: github.event_name == 'push'
    needs: links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            wiki
      - name: Generate Wiki
        run: python3 scripts/sync-wiki.py wiki
      - name: Publish Wiki changes
        working-directory: wiki
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Wiki is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "docs: sync from repository"
          git push origin HEAD:master

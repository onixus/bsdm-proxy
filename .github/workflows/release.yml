name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build packages only (no GitHub Release)"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            cmake \
            librdkafka-dev \
            libclang-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets

  build:
    name: Build package (${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.arch == 'aarch64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            cmake \
            librdkafka-dev \
            libclang-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release package
        run: ./scripts/build-package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsdm-proxy-package-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bsdm-proxy-package-*
          merge-multiple: true

      - name: Prepare release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="dist/RELEASE_NOTES.md"
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh "$VERSION" > "$NOTES_FILE"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release notes written for v${VERSION} ($(wc -l < "$NOTES_FILE") lines)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BSDM-Proxy ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*.tar.gz
          generate_release_notes: false

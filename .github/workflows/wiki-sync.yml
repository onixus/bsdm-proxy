name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'docker-compose.yml'
      - 'docs/wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Wiki
        id: checkout-wiki
        continue-on-error: true
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki || true
          if [ -d "wiki/.git" ]; then
            echo "wiki_exists=true" >> $GITHUB_OUTPUT
          else
            echo "wiki_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync wiki pages from repository
        if: steps.checkout-wiki.outputs.wiki_exists == 'true'
        run: |
          cp docs/wiki/Home.md wiki/Home.md
          cp docs/wiki/Installation-Guide.md wiki/Installation-Guide.md

      - name: Commit and push to Wiki
        if: steps.checkout-wiki.outputs.wiki_exists == 'true'
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md Installation-Guide.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: sync wiki pages from main"
            git push origin master
            echo "Wiki updated: https://github.com/${{ github.repository }}/wiki"
          else
            echo "Wiki is already up to date"
          fi

      - name: Wiki not initialized
        if: steps.checkout-wiki.outputs.wiki_exists == 'false'
        run: |
          echo "Wiki not initialized. Create first page at:"
          echo "https://github.com/${{ github.repository }}/wiki"
          exit 1

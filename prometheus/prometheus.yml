global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'bsdm-proxy'
    environment: 'production'

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'bsdm-proxy'
    static_configs:
      - targets: ['proxy:9090']
        labels:
          service: 'proxy'
          component: 'bsdm-proxy'
    
  - job_name: 'cache-indexer'
    static_configs:
      - targets: ['cache-indexer:8080']
        labels:
          service: 'cache-indexer'
          component: 'bsdm-indexer'

  # Present when compose profile `alerts` is enabled (scrapes fail quietly otherwise).
  - job_name: 'alert-worker'
    static_configs:
      - targets: ['alert-worker:8090']
        labels:
          service: 'alert-worker'
          component: 'bsdm-alerts'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

{{- if and .Values.alertWorker .Values.alertWorker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bsdm.fullname" . }}-alert-worker
  labels:
    {{- include "bsdm.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.alertWorker.service.port }}
      targetPort: admin
      protocol: TCP
      name: admin
  selector:
    {{- include "bsdm.alertWorkerSelectorLabels" . | nindent 4 }}
{{- end }}
